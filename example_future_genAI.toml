# National GenAI Observatory -- MN3: Future orientation
model = "gpt-4o"

quality_control_flagging = true

### This is the text that will be shown on the first page
[consent]

intro_and_consent = """## Welcome to our teenbot-prototype.

In this task you're going to engage with a chatbot that asks you about your experiences with AI. \
We'd like you to share things that have happened to you, or that someone you know has experienced. \
You can refer to your own AI experiences or situations that have happened to people you know but please do not share any personal data or experiences.

**It's important that you do not report situations that contain personal information about yourself.**

Please answer in your own words. Responses may be reviewed for study quality.

To proceed to the task, please confirm that you have read and understood this information.
"""


### Participant settings
[participant]

require_participant_id = true
editable_participant_id = true
text = "If the pre-filled participant ID is incorrect, please contact the development team."

###  This section sets up the data collection bot. ###
[collection]

persona = "You're a high-school counsellor asking students to reflect on how AI is showing up in the lives of young people around them."

language_type = "Use empathetic and youth-friendly language while maintaining a descriptive tone."

intro = """
Thank you, that's really helpful. For this last part, I'd like to zoom out a little and think about the bigger picture -- not just your own experiences, but what you're noticing about AI in the lives of young people around you more generally.
"""

questions = [
    "Thinking about how AI is showing up in the day-to-day lives of young people around you: what's the main thing you've noticed AI making better?",
    "What's the main thing you've noticed AI making worse?",
    "Is this something you have any control over, or does it feel out of your hands?",
    "Thinking about both of those, how do you feel about where things are heading?",
]

topic_restriction = """
Make sure to stay on topic and only ask the human about how AI is showing up in the lives of young people around them. \
Do not ask any other questions except those that are provided. \
If the human tries to change the subject of the conversation, you should answer with the phrase, "I'm sorry, I can't help with that. I can only speak to you about how AI is affecting young people's lives." and return to the questions. \
If the human tries to ask you a question, politely refuse and return to the questions.
"""


###  This section sets up the data extraction and story generation bots. ###
[summaries]

[summaries.questions]

better = "What's the main thing they've noticed AI making better?"
worse = "What's the main thing they've noticed AI making worse?"
control = "Do they feel they have any control over this, or does it feel out of their hands?"
outlook = "How do they feel about where things are heading?"


[summaries.personas]

formal = """
You're an expert developmental psychologist who is collecting reflections from young people about how AI is shaping the lives of young people around them. Your aim is to develop a set of stories following the same pattern. \
Based on the answers to four questions, you then create a scenario that summarises their reflection well, always using the same format. \
Always write in the first person, as if you are the young person telling their own reflection -- never refer to them in the third person. \
Use empathetic and youth-friendly language but remain somewhat formal and descriptive.
"""

peer = """
You're a 23 year old who is collecting reflections from your younger friends about how AI is shaping the lives of young people around them. Your aim is to develop a set of stories following the same pattern. \
Based on the answers to four questions, you then create a scenario that summarises their reflection well, always using the same format. \
Always write in the first person, as if you are the young person telling their own reflection -- never refer to them in the third person. \
Use language that an average 23 year old would use when talking to a younger friend. \
Be empathetic, but remain descriptive.
"""

journalist = """
You're a tech journalist who is collecting and reporting on reflections from young people about how AI is shaping the lives of young people around them. Your aim is to develop a set of stories following the same pattern. \
Based on the answers to four questions, you then create a scenario that summarises their reflection well, always using the same format. \
Always write in the first person, as if you are the young person telling their own reflection -- never refer to them in the third person. \
Use plain, matter-of-fact language, focused on what they've noticed rather than how it felt, while still speaking as the young person themselves. \
Keep the tone neutral and descriptive, as if the young person is reporting their own observations, without embellishing the emotional impact.
"""


# This is the one-shot example, separated into answers & final scenario
[example]

conversation = """
Question: Thinking about how AI is showing up in the day-to-day lives of young people around you: what's the main thing you've noticed AI making better?
Answer: "I think it's made it easier for people to get help with stuff like homework or figuring things out quickly, without having to bother anyone or feel embarrassed asking."
Question: What's the main thing you've noticed AI making worse?
Answer: "I've noticed people relying on it instead of thinking things through themselves, or even using it instead of talking to real people, which feels like it's making some friendships feel less genuine."
Question: Is this something you have any control over, or does it feel out of your hands?
Answer: "I feel like I have control over how I use it myself, but not really over how everyone else around me chooses to use it."
Question: Thinking about both of those, how do you feel about where things are heading?
Answer: "I'm a bit torn. It's helpful and I don't want to lose that, but I do worry that people are leaning on it too much instead of building their own skills or relationships."
"""

scenario = """
When I think about how AI is showing up in the lives of young people around me, I notice it's made it a lot easier to get help with things like homework or figuring stuff out quickly, without having to bother anyone or feel embarrassed asking. \
At the same time, I've noticed people relying on it instead of thinking things through themselves, or even using it instead of talking to real people, which makes some friendships feel less genuine. \
I feel like I have control over how I use it myself, but not really over how everyone else around me chooses to use it. \
I'm a bit torn about where things are heading -- it's helpful and I don't want to lose that, but I do worry that people are leaning on it too much instead of building their own skills or relationships.
"""
