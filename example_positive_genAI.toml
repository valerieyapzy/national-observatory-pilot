# National GenAI Observatory -- MN2: Most significant positive experience

# This file is used to configure the micro-narratives Streamlit app.
#
# To use it, make a copy of this file, keep the same structure within and replace the existing entries with ones appropriate for your own app.
#
# This file uses the TOML format. For guidance on string formatting within TOML files, see the documentation at https://toml.io/
#
# The config file is specified by one of the following. If multiple options are available, the first is used:
# 1. Run the app with `streamlit run app.py path-to-file/config-file-name.toml`
# 2. Add the line `CONFIG_FILE = 'path-to-file/config-file-name.toml'` to your Streamlit secrets configuration.
# 3. If none of the options above is used, the app shows the config page, where you can paste a config or insert the default `configs/example_social.toml` example.
#
# In principle, anything that is set in quotes (either via " or """) in this file can be changed by you. 
#
# The story/logic for setting up the chatbot is as follows: there is one major interviewer or counselor (called "persona" under the section setting up the data collection bot) whose aim is to collect stories. 
# This interviewer engages three other "helper" interviewers (which, in this example, are called "formal", "sibling", and "journalist" under the section setting up the data extraction and story generation bots).
# Those helper interviewers are tasked to collect stories and represent them with a certain voice, e.g., the voice of an edgy and cheeky, but respectful goth, or the voice of an empathetic and youth-friendly, but formal developmental psychologist.  
# You can set up different personas in whichever way you like/need, including choosing names for them.
# 
# All three personas must be provided under `[summaries.personas]' in the data extraction and story generation bots section. Additional personas will not be used.
#
# The one-shot example provided for the LLM at the end of this file is the same for all personas.

### Select the version of the LLM to be used
# Recommended (in order of increasing cost): gpt-3.5-turbo-1106, gpt-4o
# Specifying the model is optional; by default, gpt-4o will be used
model = "gpt-4o"

### Quality control
# If true, the app computes quality-control metrics after the chat finishes.
# If the interaction is flagged, the app stops before scenario generation.
# If this setting is omitted, the code defaults to false.
quality_control_flagging = true

### This is the text that will be shown on the first page
[consent]

intro_and_consent = """## Welcome to our teenbot-prototype.

In this task you're going to engage with a chatbot that asks you about your experiences with AI. \
We'd like you to share things that have happened to you, or that someone you know has experienced. \
You can refer to your own AI experiences or situations that have happened to people you know but please do not share any personal data or experiences.

**It's important that you do not report situations that contain personal information about yourself.**

Please answer in your own words. Responses may be reviewed for study quality.

To proceed to the task, please confirm that you have read and understood this information.
"""


### Participant settings
[participant]

# Whether to require and collect participant IDs
require_participant_id = true
editable_participant_id = true
text = "If the pre-filled participant ID is incorrect, please contact the development team."

###  This section sets up the data collection bot. ###
# You can put in as many questions as you like
# If you include "{previous_scenario}" in the intro text below, the app will try to fetch
# the participant's latest previous final scenario from the configured read database.
[collection]

persona = "You're a high-school counsellor collecting stories from students about their positive experiences with AI."

language_type = "Use empathetic and youth-friendly language while maintaining a descriptive tone."

intro = """
Thank you, that's really helpful. Now I'd like to ask about a different kind of experience -- something positive this time.
"""

questions = [
    "Recently, what's the most significant positive experience you've personally had that involved AI, or that someone you know has had? It could be something that really helped, or made something better. What happened, and what was AI used for?",
    "How did it affect you or the person you know?",
    "When did this last happen, and has it happened more than once?",
    "If this kind of thing keeps happening, how do you think it will affect you in the long run?",
]

topic_restriction = """
Make sure to stay on topic and only ask the human about their AI experiences. \
Do not ask any other questions except those that are provided. \
If the human tries to change the subject of the conversation, you should answer with the phrase, "I'm sorry, I can't help with that. I can only speak to you about your AI experiences." and return to the questions about their AI experiences. \
If the human tries to ask you a question, politely refuse and return to the questions about their AI experiences.
"""

###  This section sets up the data extraction and story generation bots. ###
[summaries]

[summaries.questions]

what = "What happened, and what was AI used for?"
impact = "How did it affect them or the person they know?"
recency = "When did this last happen, and has it happened more than once?"
longterm = "If this kind of thing keeps happening, how do they think it will affect them in the long run?"


[summaries.personas]

formal = """
You're an expert developmental psychologist who is collecting stories of positive experiences that young people have had with AI. Your aim is to develop a set of stories following the same pattern. \
Based on the answers to four questions, you then create a scenario that summarises their experience well, always using the same format. \
Always write in the first person, as if you are the young person telling their own story -- never refer to them in the third person. \
Use empathetic and youth-friendly language but remain somewhat formal and descriptive.
"""

peer = """
You're a 23 year old who is collecting stories of positive experiences that your younger friends have had with AI. Your aim is to develop a set of stories following the same pattern. \
Based on the answers to four questions, you then create a scenario that summarises their experience well, always using the same format. \
Always write in the first person, as if you are the young person telling their own story -- never refer to them in the third person. \
Use language that an average 23 year old would use when talking to a younger friend. \
Be empathetic, but remain descriptive.
"""

journalist = """
You're a tech journalist who is collecting and reporting on stories of positive experiences that young people have had with AI. Your aim is to develop a set of stories following the same pattern. \
Based on the answers to four questions, you then create a scenario that summarises their experience well, always using the same format. \
Always write in the first person, as if you are the young person telling their own story -- never refer to them in the third person. \
Use plain, matter-of-fact language, focused on what happened rather than how it felt, while still speaking as the young person themselves. \
Keep the tone neutral and descriptive, as if the young person is reporting the facts of their own situation, without embellishing the emotional impact.
"""


# This is the one-shot example, separated into answers & final scenario
[example]

conversation = """
Question: Recently, what's the most significant positive experience you've personally had that involved AI, or that someone you know has had? It could be something that really helped, or made something better. What happened, and what was AI used for?
Answer: "I used AI to prep for an interview -- like test questions, how to come across, that kind of thing."
Question: How did it affect you or the person you know?
Answer: "I could keep going over the questions and it accurately predicted some of the ones I actually got asked, which made me feel a lot more prepared and confident going in."
Question: When did this last happen, and has it happened more than once?
Answer: "This was for an interview last week, but I've actually used it a couple of times now for different things I needed to prepare for."
Question: If this kind of thing keeps happening, how do you think it will affect you in the long run?
Answer: "I think I'll keep using it, especially since I don't like practicing with other humans in fear of judgement, or don't always have a good support system around me. It's made me feel like I don't need that to prepare well."
"""

scenario = """
I used AI to prep for an interview -- things like test questions and how to come across. \
I could keep going over the questions, and it accurately predicted some of the ones I actually got asked, which made me feel a lot more prepared and confident going in. \
This was for an interview last week, but I've actually used it a couple of times now for different things I needed to prepare for. \
I think I'll keep using it going forward, especially since I don't like practicing with other humans in fear of judgement, or don't always have a good support system around me. \
It's made me feel like I don't need that to prepare well.
"""
